<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unserious Basketball League</title>
    <link rel="icon" type="image/x-icon" href="favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="media-queries.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>

    <header class="dashboard-header">
        <div class="header-content">
            <h1>Unserious Basketball League</h1>
            <img src="logo.png" class="logo img-fluid">
        </div>
    </header>

    <div class="dashboard-grid">
        <ul class="nav nav-pills nav-justified" id="leagueTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="schedule-tab" data-bs-toggle="tab" data-bs-target="#schedule-content" type="button" role="tab">
                Schedule
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="standings-tab" data-bs-toggle="tab" data-bs-target="#standings-content" type="button" role="tab">
                Standings
            </button>
        </li>
    </ul>

        <div class="tab-content pt-3" id="leagueTabsContent">
        <!-- Schedule Tab Pane -->
        <div class="tab-pane fade show active" id="schedule-content" role="tabpanel">
            <h2>Schedule</h2>
            <div id="schedule-container"></div>
        </div>

        <div class="tab-pane fade" id="standings-content" role="tabpanel">
            <h2>Standings</h2>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th scope="col" style="width: 80px;">Rank</th>
                            <th scope="col">Team</th>
                            <th scope="col" class="text-center">W</th>
                            <th scope="col" class="text-center">L</th>
                        </tr>
                    </thead>
                    <tbody id="standings-tbody">
                      
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
